service: eazybox

image: alexandresilvestri/eazybox

servers:
  web:
    hosts:
      - 142.93.188.6

deploy_timeout: 120

proxy:
  ssl: true
  host: eazybox.com.br

registry:
  username: alexandresilvestri
  password:
     - KAMAL_REGISTRY_PASSWORD

env:
  secret:
    - RAILS_MASTER_KEY
    - POSTGRES_PASSWORD
    - DATABASE_URL
  clear:
    SOLID_QUEUE_IN_PUMA: true
    RAILS_LOG_LEVEL: debug

aliases:
  console: app exec --interactive --reuse "bin/rails console"
  shell: app exec --interactive --reuse "bash"
  logs: app logs -f
  dbc: app exec --interactive --reuse "bin/rails dbconsole --include-password"

volumes:
  - "eazybox_storage:/rails/storage"

asset_path: /rails/public/assets

builder:
  arch: amd64

accessories:
  db:
    image: postgres:17
    host: 142.93.188.6
    port: "5432"
    env:
      clear:
        POSTGRES_USER: eazybox
        POSTGRES_DB: eazybox
      secret:
        - POSTGRES_PASSWORD
    directories:
      - volume-nyc3-01:/var/lib/postgresql/data
