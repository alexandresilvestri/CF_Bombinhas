services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    user: "1000:1000"
    ports:
      - "3000:3000"
      - "12345:12345"
    depends_on:
      db:
        condition: service_healthy
    environment:
      RAILS_ENV: development
      RAILS_MASTER_KEY: ${RAILS_MASTER_KEY}
      DATABASE_URL: postgres://cfbombinhas@db:5432/cfbombinhas
      BINDING: "0.0.0.0"
      RUBY_DEBUG_PORT: "12345"
      RUBY_DEBUG_HOST: "0.0.0.0"
    volumes:
      - .:/rails
      - bundle_cache:/usr/local/bundle
    tty: true
    command: ["bin/dev"]
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M

  test:
    build:
      context: .
      dockerfile: Dockerfile.dev
    user: "1000:1000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      RAILS_ENV: test
      RAILS_MASTER_KEY: ${RAILS_MASTER_KEY}
      DATABASE_URL: postgres://cfbombinhas@db:5432/cfbombinhas_test
    volumes:
      - .:/rails
      - bundle_cache:/usr/local/bundle
    profiles:
      - test
    command: ["bundle", "exec", "rspec"]
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  db:
    image: postgres:17
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: cfbombinhas
      POSTGRES_DB: cfbombinhas
      POSTGRES_HOST_AUTH_METHOD: trust
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cfbombinhas"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

volumes:
  postgres_data:
  bundle_cache:
